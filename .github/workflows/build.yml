name: Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [dependency-updated]
  push:
    branches: ["main"]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout quarkus-morphium
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: github

      # Morphium is not yet on Maven Central – build from source first.
      # Use -DskipTests (not -Dmaven.test.skip) so test-jar is still produced
      # for poppydb's test dependency resolution.
      - name: Checkout Morphium
        uses: actions/checkout@v6
        with:
          repository: Bardioc1977/morphium
          ref: master
          path: morphium-src

      - name: Install Morphium
        run: mvn -B install -DskipTests -f morphium-src/pom.xml

      - name: Build and test
        run: mvn -B verify

      - name: Deploy Morphium SNAPSHOT to GitHub Packages
        if: github.ref == 'refs/heads/main'
        run: >
          mvn -B deploy -DskipTests
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/Bardioc1977/quarkus-morphium
          -f morphium-src/pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy SNAPSHOT to GitHub Packages
        if: github.ref == 'refs/heads/main'
        run: mvn -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger showcase rebuild
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SHOWCASE_DISPATCH_TOKEN }}
          repository: Bardioc1977/quarkus-morphium-showcase
          event-type: dependency-updated
          client-payload: '{"source": "quarkus-morphium", "sha": "${{ github.sha }}"}'

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7
